<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FoodieHub</title>

<style>

/* BODY */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #fff1eb, #ace0f9);
  scroll-behavior: smooth;
}

/* NAVBAR */
nav {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  box-sizing: border-box;
  display: flex;
  justify-content: space-between;
  padding: 15px 40px;
  background: white;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  z-index: 1000;
}

nav h2 {
  color: #ff4d4d;
  margin: 0;
}

nav div a {
  margin-left: 25px;
  text-decoration: none;
  color: #333;
  font-weight: 500;
}

/* HERO */
.hero {
  text-align: center;
  padding: 100px 20px 40px; /* adjusted for fixed navbar */
}

.hero h1 {
  font-size: 2.8rem;
}

.hero p {
  color: #555;
}

/* CATEGORY */
.categories {
  text-align: center;
  margin: 10px;
}

.categories button {
  margin: 8px;
  padding: 10px 20px;
  border: none;
  background: linear-gradient(45deg, #ff4d4d, #ff884d);
  color: white;
  border-radius: 25px;
  cursor: pointer;
  transition: 0.3s;
}

.categories button:hover {
  transform: scale(1.05);
}

/* PRODUCTS */
.products {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
  padding: 20px;
}

.card {
  width: 250px;
  background: white;
  border-radius: 15px;
  padding: 15px;
  text-align: center;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-8px);
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  border-radius: 10px;
}

.price {
  color: #ff4d4d;
  font-weight: bold;
}

/* BUTTON */
.card button {
  margin-top: 10px;
  padding: 10px;
  width: 100%;
  border: none;
  background: linear-gradient(45deg, #ff4d4d, #ff884d);
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

/* CART */
.cart {
  text-align: center;
  padding: 40px;
}

.cart span {
  font-size: 20px;
  font-weight: bold;
  color: #ff4d4d;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  background: #333;
  color: white;
}

/* RESPONSIVE */
@media(max-width:768px){
  nav {
    flex-direction: column;
    align-items: center;
  }

  .products {
    flex-direction: column;
    align-items: center;
  }
}

</style>
</head>

<body>

<!-- SPACER FOR FIXED NAV -->
<div style="height: 70px;"></div>

<!-- NAV -->
<nav>
  <h2>FoodieHub</h2>
  <div>
    <a href="#home">Home</a>
    <a href="#menu">Menu</a>
    <a href="#cart">Cart (<span id="cartCount">0</span>)</a>
  </div>
</nav>

<!-- HERO -->
<div id="home" class="hero">
  <h1>Delicious Food Delivered Fast 🍔</h1>
  <p>Order your favorite meals anytime, anywhere</p>
</div>

<!-- CATEGORIES -->
<div class="categories">
  <button onclick="filterItems('all')">All</button>
  <button onclick="filterItems('burger')">Burgers</button>
  <button onclick="filterItems('pizza')">Pizza</button>
  <button onclick="filterItems('drink')">Drinks</button>
</div>

<!-- PRODUCTS -->
<div id="menu" class="products">

  <div class="card" data-category="burger">
    <img src="cheeseburger.jpg">
    <h3>Cheese Burger</h3>
    <p class="price">$5.99</p>
    <button onclick="addToCart()">Add to Cart</button>
  </div>

  <div class="card" data-category="pizza">
    <img src="veggiepizza.jpg">
    <h3>Veggie Supreme Pizza</h3>
    <p class="price">$9.99</p>
    <button onclick="addToCart()">Add to Cart</button>
  </div>

  <div class="card" data-category="drink">
    <img src="watermelonlemonade.jpg">
    <h3>Watermelon Lemonade</h3>
    <p class="price">$2.99</p>
    <button onclick="addToCart()">Add to Cart</button>
  </div>

<div class="card" data-category="pizza">
    <img src="cheesepizza.jpg">
    <h3>Cheese Pizza</h3>
    <p class="price">$6.99</p>
    <button onclick="addToCart()">Add to Cart</button>
  </div>

</div>

<!-- CART -->
<div id="cart" class="cart">
  <h2>Your Cart</h2>
  <p>Total Items: <span id="cartTotal">0</span></p>
</div>

<!-- FOOTER -->
<footer>
  <p>© 2026 FoodieHub</p>
</footer>

<script>

let cart = 0;

function addToCart(){
  cart++;
  document.getElementById("cartCount").innerText = cart;
  document.getElementById("cartTotal").innerText = cart;
}

/* FILTER */
function filterItems(category){
  const items = document.querySelectorAll(".card");

  items.forEach(item => {
    if(category === "all"){
      item.style.display = "block";
    } else {
      item.style.display = item.dataset.category === category ? "block" : "none";
    }
  });
}

</script>

</body>
</html>
